
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zepto Clone</title>
  <link rel="stylesheet" href="project.css">
</head>
<body>

<div class="navbar">
  <div class="logo">zepto</div>

  <div class="search-box">
    <input type="text" id="search" placeholder="Search for groceries...">
  </div>

  <div class="nav-actions">
    <button>Login</button>
    <button id="cart-btn">Cart (0)</button>
  </div>
</div>

<div class="banner">
  <h1>Groceries in 10 Minutes ⚡</h1>
  <p>Fresh fruits, vegetables & daily essentials</p>
</div>

<section class="categories">
  <h2>Shop by Category</h2>
  <div class="category-grid">
    <div class="category" data-category="all">All</div>
    <div class="category" data-category="fruits">Fruits</div>
    <div class="category" data-category="vegetables">Vegetables</div>
    <div class="category" data-category="dairy">Dairy</div>
    <div class="category" data-category="snacks">Snacks</div>
  </div>
</section>



  <!-- Products -->
  <section class="products">
  <h2>Popular Products</h2>

  <section class="product-grid">

    <section class="product">
      <img src="apple.jpg" alt="Apple">
      <h4>Apple</h4>
      <p class="price">₹120 / kg</p>
      <button>Add to Cart</button>
    </section>

    <section class="product">
      <img src="tomato.jpg" alt="Tomato">
      <h4>Tomato</h4>
      <p class="price">₹40 / kg</p>
      <button>Add to Cart</button>
    </section>

    <section class="product">
      <img src="milk.jpg" alt="Milk">
      <h4>Milk</h4>
      <p class="price">₹55 / litre</p>
      <button>Add to Cart</button>
    </section>

    <section class="product">
      <img src="bread.jpg" alt="Bread">
      <h4>Bread</h4>
      <p class="price">₹45</p>
      <button>Add to Cart</button>
    </section>

    <section class="product">
      <img src="chips.jpg" alt="Chips">
      <h4>Chips</h4>
      <p class="price">₹20</p>
      <button>Add to Cart</button>
    </section>

    <section class="product">
      <img src="dairymilk.jpg" alt="Dairymilk">
      <h4>Dairymilk</h4>
      <p class="price">₹90</p>
      <button>Add to Cart</button>
    </section>
  
    <section class="product">
      <img src="coke.jpg" alt="Thums Up">
      <h4>Thums Up</h4>
      <p class="price">₹20</p>
      <button>Add to Cart</button>
    </section>

    <section class="product">
      <img src="maggie.jpg" alt="Maggi">
      <h4>Maggi</h4>
      <p class="price">₹20</p>
      <button>Add to Cart</button>
    </section>


  


  </section>
</section>

  <footer>©️ 2026 Zepto Clone</footer>
<script src="script.js"></script>
</body>
</html>
